<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&S — AEP Customer Journey</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f7f7f7;
    height: 100vh;
    display: flex;
    align-items: stretch;
    overflow: hidden;
  }
  .slide {
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  /* LEFT PANEL */
  .left-panel {
    flex: 0 0 80%;
    display: flex;
    flex-direction: column;
    background: #f7f7f7;
    overflow: hidden;
  }

  .header {
    background: #ffffff;
    border-bottom: 1px solid #e5e5e5;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    min-height: 52px;
  }
  .header-logo {
    height: 32px;
    width: auto;
  }
  .header-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .journey-map-container {
    flex-shrink: 0;
    padding: 10px 16px 4px;
    background: #f7f7f7;
  }
  .journey-svg {
    width: 100%;
    height: auto;
    max-height: 160px;
    display: block;
  }

  /* SVG styles */
  .journey-base { fill: none; stroke: #dddddd; stroke-width: 2.5; }
  .journey-active { fill: none; stroke: #007B5E; stroke-width: 3; stroke-linecap: round; opacity: 0; transition: opacity 0.4s; }
  .journey-active.visible { opacity: 1; }
  .node-group { cursor: pointer; }
  .node-circle { fill: #ffffff; stroke: #cccccc; stroke-width: 2; r: 13; transition: fill 0.3s, stroke 0.3s; }
  .node-active .node-circle { fill: #007B5E; stroke: #007B5E; animation: nodePulse 1.8s ease-in-out infinite; }
  @keyframes nodePulse {
    0%,100% { filter: drop-shadow(0 0 0px rgba(0,123,94,0)); }
    50%      { filter: drop-shadow(0 0 6px rgba(0,123,94,0.6)); }
  }
  .node-label { font-size: 8.5px; fill: #444; font-weight: 600; pointer-events: none; }
  .node-active .node-label { fill: #007B5E; }
  .node-icon { font-size: 10px; pointer-events: none; }
  .node-active .node-icon { }

  /* DATA PANEL */
  .data-panel {
    flex: 1;
    background: #ffffff;
    border-top: 3px solid #007B5E;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .data-panel-title {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: #1a1a1a;
    padding: 7px 16px;
    border-bottom: 2px solid #1a1a1a;
    flex-shrink: 0;
    background: #ffffff;
  }
  .data-grid {
    flex: 1;
    display: flex;
    min-height: 0;
    overflow: hidden;
  }
  .data-col {
    flex: 1;
    border-right: 1px solid #eeeeee;
    padding: 8px 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .data-col:last-child { border-right: none; }
  .data-col-header {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #007B5E;
    flex-shrink: 0;
    margin-bottom: 5px;
  }
  .col-sub-header {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #007B5E;
    flex-shrink: 0;
    margin-bottom: 4px;
  }
  /* Ingestion + Segments column — always 50/50 */
  .col-ingestion-wrap { display: flex; flex-direction: column; height: 100%; }
  .col-half { flex: 0 0 50%; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; padding-bottom: 4px; }
  .col-half:first-child { border-bottom: 1px solid #eeeeee; }

  .data-item {
    font-size: 10px;
    color: #444;
    padding: 3px 5px;
    border-radius: 3px;
    border-left: 2px solid transparent;
    line-height: 1.4;
  }
  .data-item.active {
    color: #1a1a1a;
    background: rgba(0,123,94,0.10);
    border-left: 2px solid rgba(0,123,94,0.6);
    font-weight: 600;
  }
  .data-item.past { opacity: 0.38; }

  .seg {
    font-size: 10px;
    color: #444;
    padding: 3px 5px 3px 4px;
    border-radius: 3px;
    border-left: 2px solid transparent;
    display: flex;
    align-items: flex-start;
    gap: 4px;
    line-height: 1.4;
  }
  .seg.active {
    color: #1a1a1a;
    background: rgba(0,123,94,0.10);
    border-left: 2px solid rgba(0,123,94,0.6);
    font-weight: 600;
  }
  .seg.past { opacity: 0.38; }
  .seg-icon { flex-shrink: 0; font-size: 11px; }
  .seg span { display: block; font-size: 10px; }

  /* RIGHT PANEL */
  .right-panel {
    flex: 0 0 20%;
    background: #007B5E;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 16px;
    position: relative;
    overflow: hidden;
  }
  .slide-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    text-align: center;
    flex-shrink: 0;
    margin-bottom: 8px;
  }
  .slide-desc {
    font-size: 13px;
    line-height: 1.7;
    text-align: center;
    color: #ffffff;
    flex: 0 0 auto;
    margin-bottom: 14px;
  }
  .persona-avatar { margin-top: 14px; flex-shrink: 0; }

  /* Nav dots */
  .nav-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-dot.active { background: #ffffff; }

  /* Nav arrows */
  .nav-arrows {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-shrink: 0;
  }
  .nav-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    background: transparent;
    color: #ffffff;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.15); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>

let current = 0;

function goTo(idx) {
  current = Math.max(0, Math.min(slides.length - 1, idx));
  renderContent();
}
function nextSlide() { goTo(current + 1); }
function prevSlide() { goTo(current - 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextSlide();
  if (e.key === 'ArrowLeft')  prevSlide();
});

// Build nav dots
const dotsEl = document.getElementById('nav-dots');
slides.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'nav-dot';
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function accumulate(field, activeField) {
  const seen = new Map();
  for (let i = 0; i <= current; i++) {
    const items = slides[i][field] || [];
    const active = slides[i][activeField] || [];
    items.forEach(t => {
      if (i === current && active.includes(t)) {
        seen.set(t, 'active');
      } else if (!seen.has(t)) {
        seen.set(t, 'past');
      }
    });
  }
  return seen;
}

function accumulateSegs() {
  const seen = new Map();
  for (let i = 0; i <= current; i++) {
    const segs = slides[i].segs || [];
    const active = slides[i].segActive || [];
    segs.forEach(sg => {
      if (i === current && active.includes(sg.l)) {
        seen.set(sg.l, { i: sg.i, state: 'active' });
      } else if (!seen.has(sg.l)) {
        seen.set(sg.l, { i: sg.i, state: 'past' });
      }
    });
  }
  return seen;
}

function accumulateIds() {
  const seen = new Map();
  for (let i = 0; i <= current; i++) {
    (slides[i].ids || []).forEach(([label, active]) => {
      if (i === current && active) {
        seen.set(label, 'active');
      } else if (!seen.has(label)) {
        seen.set(label, active ? 'active' : 'past');
      }
    });
  }
  return seen;
}

function accumulateTech() {
  const seen = new Map();
  for (let i = 0; i <= current; i++) {
    (slides[i].tech || []).forEach(({ t, a }) => {
      if (i === current && a) {
        seen.set(t, 'active');
      } else if (!seen.has(t)) {
        seen.set(t, 'past');
      }
    });
  }
  return seen;
}

function renderContent() {
  const s = slides[current];

  // Right panel
  document.getElementById('slide-label').textContent = s.label;
  document.getElementById('slide-desc').textContent = s.desc;

  // Nav dots
  document.querySelectorAll('.nav-dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });

  // Prev/next buttons
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === slides.length - 1;

  // SVG nodes
  for (let n = 0; n < 12; n++) {
    const nodeEl = document.getElementById('node-' + n);
    if (nodeEl) nodeEl.classList.toggle('node-active', s.activeNode === n);
  }

  // Active path
  const seg = document.getElementById('active-seg');
  if (s.activeNode >= 0 && pathSegs[s.activeNode]) {
    seg.setAttribute('d', pathSegs[s.activeNode]);
    seg.classList.add('visible');
  } else {
    seg.removeAttribute('d');
    seg.classList.remove('visible');
  }

  // Data Collected
  const dataMap = accumulate('data', 'dataActive');
  document.getElementById('col-data').innerHTML =
    [...dataMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  // Ingestion
  const ingMap = accumulate('ingestion', 'ingestionActive');
  document.getElementById('col-ingestion').innerHTML =
    [...ingMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  // Segments
  const segMap = accumulateSegs();
  document.getElementById('col-segments').innerHTML =
    [...segMap.entries()].map(([label, { i, state }]) =>
      `<div class="seg${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">
        <span class="seg-icon">${i}</span>
        ${label.split('\n').map(l => `<span>${l}</span>`).join('')}
      </div>`
    ).join('');

  // Identities
  const idMap = accumulateIds();
  document.getElementById('col-identities').innerHTML =
    [...idMap.entries()].map(([label, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">
        <span style="font-weight:600">${label}</span>
      </div>`
    ).join('');

  // Orchestration
  const orchMap = accumulate('orch', 'orchActive');
  document.getElementById('col-orch').innerHTML =
    [...orchMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  // Activation
  const activMap = accumulate('activ', 'activActive');
  document.getElementById('col-activ').innerHTML =
    [...activMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  // Tech
  const techMap = accumulateTech();
  document.getElementById('col-tech').innerHTML =
    [...techMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');
}

// Initial render
renderContent();
