<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avis — CX Enterprise Journey</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f7f7f7;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: stretch;
  }

  .slide { display: flex; width: 100vw; height: 100vh; }

  .left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f7f7f7;
    overflow: hidden;
    min-width: 0;
  }

  .right-panel {
    flex: 0 0 22%;
    background: #C8102E;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    position: relative;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px 8px;
    background: #ffffff;
    border-bottom: 1px solid #e5e5e5;
    flex-shrink: 0;
  }

  .header img { height: 32px; width: auto; }

  .header-title {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.3px;
    margin-left: auto;
  }

  .header-sub {
    font-size: 11px;
    color: #666;
    font-weight: 400;
  }

  /* Journey map */
  .journey-map-container {
    padding: 4px 16px 0;
    flex-shrink: 0;
    flex-grow: 0;
    display: flex;
    align-items: center;
    transition: flex-grow 0.7s cubic-bezier(0.4, 0, 0.2, 1), padding 0.7s ease;
  }

  .journey-map-container.expanded {
    flex-grow: 1;
    padding: 16px 40px 20px;
  }

  .journey-map-container.expanded .journey-svg {
    height: 100%;
    width: 100%;
  }

  .journey-svg { width: 100%; height: auto; overflow: visible; }

  /* Data panel */
  .data-panel {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    border-top: 3px solid #C8102E;
    overflow-y: auto;
    overflow-x: hidden;
    margin: 0 16px 10px;
    border-radius: 0 0 6px 6px;
    opacity: 1;
    max-height: 2000px;
    transform: translateY(0);
    transition: opacity 0.65s ease,
                max-height 0.75s cubic-bezier(0.4, 0, 0.2, 1),
                margin-bottom 0.75s ease,
                transform 0.65s ease;
  }

  .data-panel.hidden {
    max-height: 0;
    opacity: 0;
    transform: translateY(18px);
    margin-bottom: 0;
    border-top-width: 0;
    pointer-events: none;
  }

  .data-panel-title {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: #1a1a1a;
    padding: 8px 16px;
    border-bottom: 2px solid #1a1a1a;
    flex-shrink: 0;
    background: #ffffff;
  }

  .data-grid {
    display: flex;
    min-height: fit-content;
    border-top: none;
  }

  .data-col {
    flex: 1;
    padding: 8px 10px 6px;
    border-right: 1px solid #eeeeee;
    overflow-y: visible;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }

  .data-col:last-child { border-right: none; }

  .data-col-header {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #C8102E;
    margin-bottom: 5px;
    flex-shrink: 0;
  }

  .col-sub-header {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #C8102E;
    margin-bottom: 4px;
    flex-shrink: 0;
  }

  /* Split column: Ingestion + Segments */
  .col-ingestion-wrap {
    display: grid;
    grid-template-rows: minmax(80px, 1fr) minmax(80px, 1fr);
    padding: 0;
    overflow: hidden;
  }

  .col-half {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 8px 10px 4px;
    min-height: 0;
  }

  .col-half:first-child { border-bottom: 1px solid #eeeeee; }
  .col-half:last-child { padding-top: 28px; }

  .data-item {
    font-size: 10px;
    color: #444;
    line-height: 1.35;
    padding: 2px 4px;
    border-radius: 3px;
    border-left: 2px solid transparent;
  }

  .data-item.active {
    color: #1a1a1a;
    background: rgba(80, 200, 120, 0.18);
    border-left: 2px solid rgba(80, 200, 120, 0.7);
    font-weight: 600;
  }

  .data-item.past { opacity: 0.38; }

  .seg {
    font-size: 10px;
    color: #444;
    line-height: 1.3;
    padding: 2px 4px;
    border-radius: 3px;
    border-left: 2px solid transparent;
    display: flex;
    align-items: flex-start;
    gap: 4px;
  }

  .seg.active {
    color: #1a1a1a;
    background: rgba(80, 200, 120, 0.18);
    border-left: 2px solid rgba(80, 200, 120, 0.7);
    font-weight: 600;
  }

  .seg.past { opacity: 0.38; }

  .seg-icon { font-size: 12px; flex-shrink: 0; line-height: 1.2; }

  /* SVG journey */
  .journey-base {
    fill: none;
    stroke: #ddd;
    stroke-width: 2;
  }

  .journey-active {
    fill: none;
    stroke: #C8102E;
    stroke-width: 3;
    stroke-linecap: round;
    opacity: 0;
  }

  .journey-active.visible {
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  .node-circle {
    fill: #fff;
    stroke: #ccc;
    stroke-width: 2;
    transition: fill 0.3s, stroke 0.3s;
    r: 13;
  }

  .node-active .node-circle {
    fill: #C8102E;
    stroke: #C8102E;
    animation: nodePulse 1.5s ease-in-out infinite;
  }

  @keyframes nodePulse {
    0%, 100% { filter: drop-shadow(0 0 0px rgba(0,0,0,0)); }
    50%       { filter: drop-shadow(0 0 6px rgba(200,16,46,0.5)); }
  }

  .node-label {
    font-size: 8.5px;
    fill: #444;
    text-anchor: middle;
  }

  .node-active .node-label { font-weight: 700; }

  .node-emoji {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    line-height: 1;
    user-select: none;
  }

  /* Right panel */
  .slide-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.75;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  .slide-desc {
    font-size: 13px;
    line-height: 1.55;
    flex-shrink: 0;
    margin-bottom: 10px;
  }

  .persona-avatar { margin-top: 14px; flex-shrink: 0; }

  .nav-dots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 5px;
    margin-top: 14px;
    flex-shrink: 0;
    max-width: 140px;
  }

  .nav-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }

  .nav-dot.active {
    background: #ffffff;
    transform: scale(1.25);
  }

  .nav-arrow {
    position: absolute;
    bottom: 18px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .nav-arrow:hover { background: rgba(255,255,255,0.28); }
  .nav-arrow.prev { left: 14px; }
  .nav-arrow.next { right: 14px; }
</style>

      'AJO: Booking confirmation email triggered',
    ],
    orchActive: [
      'AJO: SMS re-engagement — checkout completion nudge',
      'AJO: Booking confirmation email triggered',
    ],
    activ: [
      'CDP → Meta Custom Audience: Quote Abandoner',
      'CDP → Google Ads RLSA: Quote Abandoner',
    ],
    activActive: [],
    tech: [
      {t: 'Adyen', a: true},
      {t: 'Avis Preferred loyalty platform', a: true},
      {t: 'Campaign Monitor', a: false},
      {t: 'Adobe Marketing Cloud', a: true},
      {t: 'Amazon Redshift', a: true},
    ],
  },
];

let current = 0;
let overviewTimers = [];

function clearOverviewTimers() {
  overviewTimers.forEach(t => clearTimeout(t));
  overviewTimers = [];
}

function resetNodes() {
  for (let n = 0; n < 12; n++) {
    document.getElementById('node-' + n).classList.remove('node-active');
  }
}

function animateOverview() {
  clearOverviewTimers();
  resetNodes();

  const seg = document.getElementById('active-seg');
  seg.setAttribute('d', pathSegs[11]);
  seg.style.transition = 'none';
  seg.style.opacity = '1';
  seg.classList.remove('visible');

  const totalLength = seg.getTotalLength();
  seg.style.strokeDasharray = totalLength + ' ' + totalLength;
  seg.style.strokeDashoffset = totalLength;

  seg.getBoundingClientRect();

  const duration = 7000;
  seg.style.transition = `stroke-dashoffset ${duration}ms cubic-bezier(0.35, 0, 0.45, 1)`;
  seg.style.strokeDashoffset = '0';
}

function goTo(idx) {
  clearOverviewTimers();
  current = Math.max(0, Math.min(slides.length - 1, idx));

  const seg = document.getElementById('active-seg');
  seg.style.transition = 'none';
  seg.style.strokeDasharray = '';
  seg.style.strokeDashoffset = '';
  seg.style.opacity = '';
  seg.classList.remove('visible');
  seg.removeAttribute('d');
  resetNodes();

  renderContent();

  if (current === 0) animateOverview();
}

function nextSlide() { goTo(current + 1); }
function prevSlide() { goTo(current - 1); }

function renderContent() {
  const s = slides[current];
  const isOverview = current === 0;

  const panel = document.querySelector('.data-panel');
  if (isOverview) {
    panel.classList.add('hidden');
  } else {
    panel.classList.remove('hidden');
  }
  document.querySelector('.journey-map-container').classList.toggle('expanded', isOverview);

  document.getElementById('slide-label').textContent = s.label;
  document.getElementById('slide-desc').textContent = s.desc;

  const dotsEl = document.getElementById('nav-dots');
  dotsEl.innerHTML = slides.map((_, i) =>
    `<div class="nav-dot${i === current ? ' active' : ''}" onclick="goTo(${i})"></div>`
  ).join('');

  if (!isOverview) {
    for (let n = 0; n < 12; n++) {
      document.getElementById('node-' + n).classList.toggle('node-active', s.activeNode === n);
    }
    const seg = document.getElementById('active-seg');
    const pi = s.activeNode;
    if (s.activeNode >= 0 && pi > 0) {
      seg.setAttribute('d', pathSegs[pi]);
      seg.classList.add('visible');
    } else {
      seg.removeAttribute('d');
      seg.classList.remove('visible');
    }
  }

  function accumulate(field, activeField) {
    const seen = new Map();
    for (let i = 0; i <= current; i++) {
      const items = slides[i][field] || [];
      const active = slides[i][activeField] || [];
      items.forEach(t => {
        if (i === current && active.includes(t)) seen.set(t, 'active');
        else if (!seen.has(t)) seen.set(t, 'past');
      });
    }
    return seen;
  }

  const dataMap = accumulate('data', 'dataActive');
  document.getElementById('col-data').innerHTML =
    [...dataMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  const ingMap = accumulate('ingestion', 'ingestionActive');
  document.getElementById('col-ingestion').innerHTML =
    [...ingMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  function accumulateSegs() {
    const seen = new Map();
    for (let i = 0; i <= current; i++) {
      const segs = slides[i].segs || [];
      const active = slides[i].segActive || [];
      segs.forEach(sg => {
        if (i === current && active.includes(sg.l)) seen.set(sg.l, {i: sg.i, state: 'active'});
        else if (!seen.has(sg.l)) seen.set(sg.l, {i: sg.i, state: 'past'});
      });
    }
    return seen;
  }
  const segMap = accumulateSegs();
  document.getElementById('col-segments').innerHTML =
    [...segMap.entries()].map(([label, {i, state}]) =>
      `<div class="seg${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">
        <span class="seg-icon">${i}</span>
        <span>${label.replace('\n', ' ')}</span>
      </div>`
    ).join('');

  function accumulateIds() {
    const seen = new Map();
    for (let i = 0; i <= current; i++) {
      (slides[i].ids || []).forEach(([label, active]) => {
        if (i === current && active) seen.set(label, 'active');
        else if (!seen.has(label)) seen.set(label, active ? 'active' : 'past');
      });
    }
    return seen;
  }
  const idMap = accumulateIds();
  document.getElementById('col-identities').innerHTML =
    [...idMap.entries()].map(([label, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">
        <span style="font-weight:600">${label}</span>
      </div>`
    ).join('');

  const orchMap = accumulate('orch', 'orchActive');
  document.getElementById('col-orch').innerHTML =
    [...orchMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  const activMap = accumulate('activ', 'activActive');
  document.getElementById('col-activ').innerHTML =
    [...activMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');

  function accumulateTech() {
    const seen = new Map();
    for (let i = 0; i <= current; i++) {
      (slides[i].tech || []).forEach(({ t, a }) => {
        if (i === current && a) seen.set(t, 'active');
        else if (!seen.has(t)) seen.set(t, 'past');
      });
    }
    return seen;
  }
  const techMap = accumulateTech();
  document.getElementById('col-tech').innerHTML =
    [...techMap.entries()].map(([t, state]) =>
      `<div class="data-item${state === 'active' ? ' active' : state === 'past' ? ' past' : ''}">${t}</div>`
    ).join('');
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextSlide();
  if (e.key === 'ArrowLeft')  prevSlide();
});

renderContent();
animateOverview();
</script>
</body>
</html>
